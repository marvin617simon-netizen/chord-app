<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chord Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 450px; 
        }
        h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 2rem; }
        select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            margin-bottom: 1rem; 
            cursor: pointer; 
            font-size: 1rem;
            outline: none;
        }
        .main-btn { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-size: 1.1rem;
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .main-btn:active { transform: scale(0.98); }
        
        /* New Styles for Options List */
        #result-list {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        /* Staggered animation delays for the rows */
        .option-row:nth-child(1) { animation-delay: 0.1s; }
        .option-row:nth-child(2) { animation-delay: 0.2s; }
        .option-row:nth-child(3) { animation-delay: 0.3s; }

        .chords-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            flex: 1;
        }
        .chord-tag { 
            background: #eef2ff; 
            color: var(--primary); 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border: 1px solid #c7d2fe; 
        }
        .play-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
        }
        .play-btn:hover { background: #059669; }
        .play-btn:active { transform: scale(0.95); }

        @keyframes fadeIn { 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎵 AI Chord Generator</h1>
    
    <select id="mood">
        <option value="happy">🌞 Happy / Upbeat</option>
        <option value="sad">🌙 Sad / Emotional</option>
        <option value="jazz">☕ Jazz / Lo-Fi</option>
    </select>

    <button class="main-btn" onclick="generateOptions()">Generate Ideas</button>

    <div id="result-list"></div>
</div>

<script>
    // Audio Setup
    const synth = new Tone.PolySynth(Tone.Synth).toDestination();
    synth.set({
        oscillator: { type: "triangle" },
        envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 1.2 }
    });

    // Expanded Note Dictionary (Added more chords to support richer progressions)
    const chordNotes = {
        "C": ["C4", "E4", "G4"], "G": ["G3", "B3", "D4"], "Am": ["A3", "C4", "E4"], "F": ["F3", "A3", "C4"],
        "D": ["D4", "Fs4", "A4"], "Em": ["E3", "G3", "B3"], "Bm": ["B3", "D4", "Fs4"], "A": ["A3", "Cs4", "E4"],
        "Dm": ["D4", "F4", "A4"], "Bb": ["Bb3", "D4", "F4"],
        "Cmaj7": ["C4", "E4", "G4", "B4"], "Am7": ["A3", "C4", "E4", "G4"], 
        "Dm7": ["D4", "F4", "A4", "C5"], "G7": ["G3", "B3", "D4", "F4"],
        "Fmaj7": ["F3", "A3", "C4", "E4"], "Em7": ["E3", "G3", "B3", "D4"], "A7": ["A3", "Cs4", "E4", "G4"]
    };

    // Database of Progressions (Some are 4 chords, some are 6 or 8)
    const progressionsDB = {
        "happy": [
            ["C", "G", "Am", "F"],
            ["C", "F", "C", "G"],
            ["D", "A", "Bm", "G"],
            ["F", "C", "G", "Am"],
            ["C", "Em", "F", "G", "C", "F", "C", "G"] // 8-chord progression
        ],
        "sad": [
            ["Am", "F", "C", "G"],
            ["Em", "C", "G", "D"],
            ["Dm", "Bb", "F", "C"],
            ["Am", "Dm", "G", "C", "F", "Dm", "E", "Am"], // Longer dramatic progression
            ["Am", "G", "F", "G"]
        ],
        "jazz": [
            ["Cmaj7", "Am7", "Dm7", "G7"],
            ["Fmaj7", "Em7", "Dm7", "Cmaj7"],
            ["Dm7", "G7", "Cmaj7", "A7"],
            ["Am7", "D", "Gmaj7", "Cmaj7"]
        ]
    };

    function generateOptions() {
        const mood = document.getElementById("mood").value;
        const resultList = document.getElementById("result-list");
        
        // Clear previous results
        resultList.innerHTML = "";

        // Get the pool of progressions for the selected mood
        let pool = [...progressionsDB[mood]];
        
        // Shuffle the array to get random options every time
        pool.sort(() => 0.5 - Math.random());
        
        // Pick the top 3 options
        const selectedOptions = pool.slice(0, 3);

        // Render each option to the screen
        selectedOptions.forEach((chordsArray, index) => {
            // Create the row div
            const row = document.createElement("div");
            row.className = "option-row";

            // Create the chord tags container
            const chordsDiv = document.createElement("div");
            chordsDiv.className = "chords-display";
            chordsDiv.innerHTML = chordsArray.map(c => `<span class="chord-tag">${c}</span>`).join("");

            // Create the Play button
            const playBtn = document.createElement("button");
            playBtn.className = "play-btn";
            playBtn.innerHTML = "▶ Play";
            // Attach the play function to this specific button
            playBtn.onclick = () => playProgression(chordsArray);

            // Put them together
            row.appendChild(chordsDiv);
            row.appendChild(playBtn);
            resultList.appendChild(row);
        });
    }

    async function playProgression(chordsArray) {
        // Start audio context (browser requirement)
        await Tone.start();
        
        // Stop any currently playing sounds so they don't overlap
        synth.releaseAll();

        const now = Tone.now();
        
        // Play each chord in the array
        chordsArray.forEach((chordName, index) => {
            // If the chord isn't in our dictionary, default to C
            const notes = chordNotes[chordName] || ["C4", "E4", "G4"];
            
            // Each chord plays for 1 second, separated by 1 second intervals
            synth.triggerAttackRelease(notes, "2n", now + (index * 1.0));
        });
    }
</script>

</body>
</html>
