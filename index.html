<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chord Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        :root { --primary: #6366f1; --bg: #f8fafc; }
        body { 
            font-family: system-ui, -apple-system, sans-serif; 
            background: #f0f2f5; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
        }
        .card { 
            background: white; 
            padding: 2.5rem; 
            border-radius: 24px; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.1); 
            text-align: center; 
            width: 100%;
            max-width: 450px; 
        }
        h1 { font-size: 1.5rem; color: #1e293b; margin-bottom: 2rem; }
        select { 
            width: 100%; 
            padding: 12px; 
            border-radius: 12px; 
            border: 2px solid #e2e8f0; 
            margin-bottom: 1rem; 
            cursor: pointer; 
            font-size: 1rem;
            outline: none;
        }
        .main-btn { 
            width: 100%; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--primary); 
            color: white; 
            font-size: 1.1rem;
            font-weight: 700; 
            cursor: pointer; 
            transition: 0.2s; 
        }
        .main-btn:active { transform: scale(0.98); }
        
        #result-list {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg);
            padding: 12px;
            border-radius: 16px;
            border: 1px solid #e2e8f0;
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
            transform: translateY(10px);
        }
        .option-row:nth-child(1) { animation-delay: 0.1s; }
        .option-row:nth-child(2) { animation-delay: 0.2s; }
        .option-row:nth-child(3) { animation-delay: 0.3s; }

        .chords-display {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            flex: 1;
        }
        .chord-tag { 
            background: #eef2ff; 
            color: var(--primary); 
            padding: 6px 10px; 
            border-radius: 6px; 
            font-weight: bold; 
            font-size: 0.9rem;
            border: 1px solid #c7d2fe; 
        }
        .play-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
            transition: 0.2s;
            min-width: 90px;
        }
        .play-btn:hover { background: #059669; }
        .play-btn:active { transform: scale(0.95); }

        @keyframes fadeIn { 
            to { opacity: 1; transform: translateY(0); } 
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🎵 AI Chord Generator</h1>
    
    <select id="mood">
        <option value="happy">🌞 Happy / Upbeat</option>
        <option value="sad">🌙 Sad / Emotional</option>
        <option value="jazz">☕ Jazz / Lo-Fi</option>
    </select>

    <button class="main-btn" onclick="generateOptions()">Generate Ideas</button>

    <div id="result-list"></div>
</div>

<script>
    // 将合成器设为全局变量，但不在这里立刻创建
    let synth = null;

    const chordNotes = {
        "C": ["C4", "E4", "G4"], "G": ["G3", "B3", "D4"], "Am": ["A3", "C4", "E4"], "F": ["F3", "A3", "C4"],
        "D": ["D4", "Fs4", "A4"], "Em": ["E3", "G3", "B3"], "Bm": ["B3", "D4", "Fs4"], "A": ["A3", "Cs4", "E4"],
        "Dm": ["D4", "F4", "A4"], "Bb": ["Bb3", "D4", "F4"],
        "Cmaj7": ["C4", "E4", "G4", "B4"], "Am7": ["A3", "C4", "E4", "G4"], 
        "Dm7": ["D4", "F4", "A4", "C5"], "G7": ["G3", "B3", "D4", "F4"],
        "Fmaj7": ["F3", "A3", "C4", "E4"], "Em7": ["E3", "G3", "B3", "D4"], "A7": ["A3", "Cs4", "E4", "G4"]
    };

    const progressionsDB = {
        "happy": [
            ["C", "G", "Am", "F"], ["C", "F", "C", "G"], ["D", "A", "Bm", "G"], ["F", "C", "G", "Am"],
            ["C", "Em", "F", "G", "C", "F", "C", "G"] 
        ],
        "sad": [
            ["Am", "F", "C", "G"], ["Em", "C", "G", "D"], ["Dm", "Bb", "F", "C"],
            ["Am", "Dm", "G", "C", "F", "Dm", "E", "Am"], ["Am", "G", "F", "G"]
        ],
        "jazz": [
            ["Cmaj7", "Am7", "Dm7", "G7"], ["Fmaj7", "Em7", "Dm7", "Cmaj7"],
            ["Dm7", "G7", "Cmaj7", "A7"], ["Am7", "D", "Gmaj7", "Cmaj7"]
        ]
    };

    let currentPlayId = 0; 

    function generateOptions() {
        const mood = document.getElementById("mood").value;
        const resultList = document.getElementById("result-list");
        resultList.innerHTML = "";

        let pool = [...progressionsDB[mood]];
        pool.sort(() => 0.5 - Math.random());
        const selectedOptions = pool.slice(0, 3);

        selectedOptions.forEach((chordsArray, index) => {
            const row = document.createElement("div");
            row.className = "option-row";

            const chordsDiv = document.createElement("div");
            chordsDiv.className = "chords-display";
            chordsDiv.innerHTML = chordsArray.map(c => `<span class="chord-tag">${c}</span>`).join("");

            const playBtn = document.createElement("button");
            playBtn.className = "play-btn";
            playBtn.innerHTML = "▶ Play";
            
            playBtn.onclick = () => {
                document.querySelectorAll('.play-btn').forEach(btn => {
                    btn.innerHTML = "▶ Play";
                    btn.style.background = "#10b981";
                });
                
                playBtn.innerHTML = "🎶 Playing";
                playBtn.style.background = "#6366f1";
                
                playProgression(chordsArray, playBtn);
            };

            row.appendChild(chordsDiv);
            row.appendChild(playBtn);
            resultList.appendChild(row);
        });
    }

    async function playProgression(chordsArray, btnElement) {
        await Tone.start();
        
        // 【核心修改点】：发现旧合成器？直接彻底销毁释放内存！
        if (synth !== null) {
            synth.releaseAll();
            synth.dispose(); // 砸烂旧机器，杜绝任何余音残留
        }
        
        // 买一台全新的合成器
        synth = new Tone.PolySynth(Tone.Synth).toDestination();
        synth.set({
            oscillator: { type: "triangle" },
            // 把 Release 稍微调短到 0.8，既有回音也不会拖泥带水
            envelope: { attack: 0.1, decay: 0.2, sustain: 0.5, release: 0.8 } 
        });
        
        currentPlayId++;
        const thisPlayId = currentPlayId;

        for (let i = 0; i < chordsArray.length; i++) {
            if (currentPlayId !== thisPlayId) return;

            const chordName = chordsArray[i];
            const notes = chordNotes[chordName] || ["C4", "E4", "G4"];
            
            // 立刻发声
            synth.triggerAttackRelease(notes, "2n", Tone.now());
            
            // 等待 1 秒
            await new Promise(resolve => setTimeout(resolve, 1000));
        }
        
        if (currentPlayId === thisPlayId) {
            btnElement.innerHTML = "▶ Play";
            btnElement.style.background = "#10b981";
        }
    }
</script>

</body>
</html>
